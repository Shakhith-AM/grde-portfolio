function parseCSV(text) {
  const lines = text.trim().split("\n").filter(Boolean);
  if (lines.length < 2) return [];
  const headers = lines[0].split(",").map(h => h.replace(/"/g,"").trim().toLowerCase());
  return lines.slice(1).map(line => {
    const vals = line.match(/(".*?"|[^,]+)(?=,|$)/g) || [];
    const obj = {};
    headers.forEach((h,i) => { obj[h] = (vals[i]||"").replace(/"/g,"").trim(); });
    return obj;
  });
}
function daysUntil(dateStr) {
  if (!dateStr || dateStr.toLowerCase()==="monthly") return null;
  const months = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
  const parts = dateStr.trim().split(" ");
  if (parts.length < 2) return null;
  const mon = months[parts[0].toLowerCase().slice(0,3)];
  const yr  = parseInt(parts[1]);
  if (mon===undefined||isNaN(yr)) return null;
  const diff = new Date(yr,mon,1) - new Date();
  return Math.ceil(diff/(1000*60*60*24));
}
const typeColor = t => { const tl=(t||"").toLowerCase(); return tl==="red"?"var(--danger)":tl==="green"?"var(--good)":"var(--gold)"; };
const typeIcon  = t => { const tl=(t||"").toLowerCase(); return tl==="red"?"🔴":tl==="green"?"🟢":"🟡"; };

}

  const [newsError, setNewsError] = useState(false);

  const fetchData = async () => {
    setLoading(true);
    setFetchError("");
    try {
      // Cache-bust: Google's CDN + browsers cache published CSV aggressively,
      // so append a fresh timestamp on every call and skip the HTTP cache.
      const bust = `&cb=${Date.now()}`;
      const [aR, cR] = await Promise.all([
        fetch(ALERTS_URL + bust, { cache: "no-store" }),
        fetch(CALENDAR_URL + bust, { cache: "no-store" })
      ]);
      if (!aR.ok || !cR.ok) throw new Error(`Sheet responded with ${aR.status}/${cR.status}`);
      const [aT, cT] = await Promise.all([aR.text(), cR.text()]);
      const pA = parseCSV(aT), pC = parseCSV(cT);
      if (pA.length) setAlerts(pA);
      if (pC.length) setCalendar(pC);
      setLive(true);
      setLastFetch(new Date());
    } catch (e) {
      setFetchError("Couldn't reach the live sheet — showing last known data.");
    }
    setLoading(false);
  };
  useEffect(() => {
    fetchData();
    // Auto-refresh every 5 minutes so alerts stay current without manual refresh
    const t = setInterval(fetchData, 5 * 60 * 1000);
    return () => clearInterval(t);
  }, []);

  const hasPersonalData = personalAlerts.length > 0;

  return (

          {lastFetch && <span className="mono" style={{ fontSize:9, color:"var(--text-dim)" }}>LIVE · {lastFetch.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"})}</span>}

/* ─── Helpers ──────────────────────────────────────────────── */
function getAllocation(age) {
  if (age < 25) return AGE_BANDS[0];
  if (age >= 100) return AGE_BANDS[AGE_BANDS.length - 1];
  const idx = Math.min(Math.floor((age - 25) / 5), AGE_BANDS.length - 1);
  return AGE_BANDS[idx];
}
function getBand(age) {
  if (age < 25) return "25-30";
  if (age >= 100) return "95-100";
  const lo = Math.floor(age / 5) * 5;
  return `${lo}-${lo + 5}`;
}
/* ─── Clipboard copy — with fallback for file:// / non-secure contexts ───
   navigator.clipboard requires a secure context (https:// or localhost).
   It's silently unavailable when the app is opened as a local file
   (file://...), which is exactly how the desktop-backup version is used —
   so we fall back to the older execCommand method in that case. ───────── */
async function copyText(text) {
  try {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(text);
      return true;
    }
  } catch(e) {}
  try {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.left = "-9999px";
    ta.style.top = "0";
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    const ok = document.execCommand("copy");
    document.body.removeChild(ta);
    return ok;
  } catch(e) {
    return false;
  }
}
function fmtINR(val) {
  if (val == null || isNaN(val)) return "—";
  const c = CURRENCIES[CCY];
  const conv = Number(val) / c.rate;
  const n = Math.abs(conv);
  const sign = conv < 0 ? "-" : "";
  for (const [thresh, suffix] of c.units) {
    if (n >= thresh) return `${sign}${c.symbol}${(n / thresh).toFixed(2)} ${suffix}`;
  }
  return `${sign}${c.symbol}${n.toLocaleString(c.locale, { maximumFractionDigits: n < 100 ? 2 : 0 })}`;
}

/* ─── Currency engine (display in selected ccy; storage stays in INR) ── */
const CURRENCIES = {
  INR: { symbol: "₹",  code: "INR", flag: "IN", locale: "en-IN", rate: 1,    units: [[1e7, "Cr"], [1e5, "L"]] },
  USD: { symbol: "$",  code: "USD", flag: "US", locale: "en-US", rate: 83,   units: [[1e9, "B"], [1e6, "M"], [1e3, "K"]] },
  EUR: { symbol: "€",  code: "EUR", flag: "EU", locale: "en-IE", rate: 90,   units: [[1e9, "B"], [1e6, "M"], [1e3, "K"]] },
  GBP: { symbol: "£",  code: "GBP", flag: "GB", locale: "en-GB", rate: 105,  units: [[1e9, "B"], [1e6, "M"], [1e3, "K"]] },
  AED: { symbol: "د.إ", code: "AED", flag: "AE", locale: "en-AE", rate: 22.6,units: [[1e9, "B"], [1e6, "M"], [1e3, "K"]] },
};
const CCY_KEY = "grde_ccy_v1";
let CCY = (() => { try { return localStorage.getItem(CCY_KEY) || "INR"; } catch(e) { return "INR"; } })();
function setCCY(c) { CCY = c; try { localStorage.setItem(CCY_KEY, c); } catch(e) {} }
function ccySym() { return CURRENCIES[CCY].symbol; }
function ccyCode() { return CURRENCIES[CCY].code; }
function ccyFlag() { return CURRENCIES[CCY].flag; }
/** INR (canonical storage) → number to show in input field, in active currency. */
function inrToInput(inr) {
  if (inr === "" || inr == null || isNaN(Number(inr))) return "";
  const v = Number(inr) / CURRENCIES[CCY].rate;
  return Math.round(v * 100) / 100;
}
/** Input value (in active currency) → INR for storage. "" stays "". */
function inputToInr(v) {
  if (v === "" || v == null) return "";
  const n = Number(v);
  if (isNaN(n)) return "";
  return n * CURRENCIES[CCY].rate;
}

/* ─── Shared: read live Tracker data from localStorage ─────────
   Used by ISR Analysis and Dashboard so both reflect the same
   holdings without re-typing anything. ─────────────────────── */
function computeLiveTrackerData(age) {
  const alloc = getAllocation(age);
  const trackerData = (() => {
    try { const s = localStorage.getItem(TRACKER_KEY); return s ? JSON.parse(s) : null; } catch(e) { return null; }
  })();
  const trackerValues = trackerData?.values || {};
  const trackerTotal  = Number(trackerData?.totalPortfolio) || 0;
  const customNames   = trackerData?.customNames || {};

  // If "Total Portfolio Value" is left blank, fall back to the sum of
  // whatever's actually been entered per-asset — so target-based scoring
  // (Diversification, Gold, International, Healthcare, Rebalancing) still
  // works without requiring that one extra field to be filled in.
  const rawCurrent = ASSET_TEMPLATE.map(a => Number(trackerValues[a.id]) || 0);
  const liveActualTotalRaw = rawCurrent.reduce((s, v) => s + v, 0);
  const effectiveTotal = trackerTotal > 0 ? trackerTotal : liveActualTotalRaw;

  const liveAssets = ASSET_TEMPLATE.map((a, i) => {
    const finalPct   = alloc[a.cat] * a.catFrac;
    const targetVal  = effectiveTotal * finalPct / 100;
    const currentVal = rawCurrent[i];
    // Subscriber's own fund name takes over everywhere this asset is shown
    // (ISR, Dashboard, Rebalancing Priority, PDF) — the % framework underneath
    // never changes, only the label of what's held in that slot.
    const name = customNames[a.id] || a.name;
    return { ...a, name, finalPct, targetVal, currentVal, variance: currentVal - targetVal };
  });
  const liveActualTotal = liveAssets.reduce((s, a) => s + a.currentVal, 0);
  const denom = liveActualTotal > 0 ? liveActualTotal : trackerTotal;

  const liveCat = {};
  CATS.forEach(cat => {
    const cur = liveAssets.filter(a => a.cat === cat).reduce((s, a) => s + a.currentVal, 0);
    const tgt = liveAssets.filter(a => a.cat === cat).reduce((s, a) => s + a.targetVal, 0);
    liveCat[cat] = { cur, tgt, curPct: denom > 0 ? (cur / denom) * 100 : 0, tgtPct: alloc[cat] };
  });

  const hasLiveData = liveActualTotal > 0;
  return {
    alloc, liveAssets, liveCat, hasLiveData, denom,
    trackerTotal, reportDate: trackerData?.reportDate,
    netWorth: liveActualTotal > 0 ? liveActualTotal : trackerTotal,
  };
}

/* ─── Expanded multi-factor GRDE Health Score (0–100) ───────────
   Diversification · Emergency Fund · ISR Balance · Debt Ratio ·
   Rebalancing · International Exposure · Healthcare · Gold ──── */
function computeExpandedHealth(liveAssets, liveCat, alloc, denom) {
  const byId = id => liveAssets.find(a => a.id === id);
  const pctFunded = id => {
    const a = byId(id);
    if (!a || !a.targetVal) return 0;
    return Math.max(0, Math.min(100, (a.currentVal / a.targetVal) * 100));
  };
  const withTarget = liveAssets.filter(a => a.targetVal > 0);
  const totalWithTarget = withTarget.length;

  const diversification = totalWithTarget > 0
    ? (liveAssets.filter(a => a.currentVal > 0).length / totalWithTarget) * 100 : 0;
  const emergencyFund = pctFunded("d_liq");
  const isrDiff = Math.abs((liveCat.G.curPct + liveCat.R.curPct + liveCat.D.curPct) - (alloc.G + alloc.R + alloc.D));
  const isrBalance = Math.max(0, 100 - isrDiff * 4);
  const debtDiff = Math.abs(liveCat.D.curPct - alloc.D);
  const debtRatio = Math.max(0, 100 - debtDiff * 4);
  const redCount = withTarget.filter(a => {
    if (a.currentVal === 0 || !denom) return false;
    return Math.abs(a.variance) / denom * 100 >= 3;
  }).length;
  const rebalancing = totalWithTarget > 0 ? Math.max(0, 100 - (redCount / totalWithTarget) * 100) : 0;
  const international = pctFunded("e_etfus");
  const healthcare = pctFunded("e_hc");
  const gold = pctFunded("g_gold");

  const factors = [
    { key: "diversification", label: "Diversification",        score: diversification },
    { key: "emergency",       label: "Emergency Fund",          score: emergencyFund },
    { key: "isr",             label: "ISR Balance",             score: isrBalance },
    { key: "debt",            label: "Debt Ratio",              score: debtRatio },
    { key: "rebalancing",     label: "Rebalancing",             score: rebalancing },
    { key: "intl",            label: "International Exposure",  score: international },
    { key: "healthcare",      label: "Healthcare",              score: healthcare },
    { key: "gold",            label: "Gold",                    score: gold },
  ];
  const overall = Math.round(factors.reduce((s, f) => s + f.score, 0) / factors.length);
  return { overall, factors };
}
function healthLabelFor(score) {
  if (score === null || score === undefined) return { text: "No data", color: "var(--text-dim)" };
  if (score >= 90) return { text: "Excellent", color: "var(--good)" };
  if (score >= 75) return { text: "Well Structured", color: "#7fb86a" };
  if (score >= 60) return { text: "Needs Attention", color: "var(--gold)" };
  return { text: "Rebalancing Required", color: "var(--danger)" };
}

/* ─── Personalized Portfolio Signals ─────────────────────────
   Computed entirely from the subscriber's own Tracker entries —
   no manual curation needed, unlike the shared Pulse feed below.
   Purely descriptive math on their own numbers: safe, personal,
   and automatically different for every subscriber. ─────────── */
function computePersonalAlerts(age) {
  const live = computeLiveTrackerData(age);
  const { liveAssets, liveCat, alloc, hasLiveData, denom } = live;
  if (!hasLiveData) return [];

  const alerts = [];
  const byId = id => liveAssets.find(a => a.id === id);
  const fundedPct = id => {
    const a = byId(id);
    if (!a || !a.targetVal) return null;
    return (a.currentVal / a.targetVal) * 100;
  };

  // Specific under-funded holdings worth a direct nudge
  [
    { id: "d_liq",   label: "Emergency liquidity" },
    { id: "g_gold",  label: "Gold" },
    { id: "e_etfus", label: "International exposure" },
    { id: "e_hc",    label: "Healthcare allocation" },
  ].forEach(({ id, label }) => {
    const pct = fundedPct(id);
    const a = byId(id);
    if (pct !== null && pct < 50) {
      alerts.push({
        type: pct < 25 ? "red" : "yellow", cat: a.cat,
        message: `${label} (${a.name}) is only ${Math.round(pct)}% funded vs target — consider adding`,
        date: "Live"
      });
    }
  });

  // Category-level drift beyond 3% of total portfolio
  CATS.forEach(cat => {
    const diff = liveCat[cat].curPct - liveCat[cat].tgtPct;
    if (Math.abs(diff) >= 3) {
      alerts.push({
        type: diff > 0 ? "yellow" : "red", cat,
        message: diff > 0
          ? `${CAT_META[cat].label} is ${diff.toFixed(1)}% above target — consider trimming`
          : `${CAT_META[cat].label} is ${Math.abs(diff).toFixed(1)}% below target — consider adding`,
        date: "Live"
      });
    }
  });

  // Top single most-overweight holding, if meaningfully off
  const overweight = [...liveAssets]
    .filter(a => a.targetVal > 0 && a.currentVal > 0)
    .sort((a, b) => b.variance - a.variance)[0];
  if (overweight && denom > 0 && (overweight.variance / denom * 100) >= 5) {
    alerts.push({
      type: "green", cat: overweight.cat,
      message: `${overweight.name} is well ahead of target — could trim to fund the gaps above`,
      date: "Live"
    });
  }

  // Nothing flagged — genuinely well balanced
  if (alerts.length === 0) {
    alerts.push({ type: "green", cat: "", message: "Your portfolio is well balanced against the GRDE framework right now", date: "Live" });
  }

  return alerts;
}

/* ─── Live News Headlines — per G/R/D/E category, region-aware ──
   Pulled from Google News RSS (free, no signup) via a free public
   CORS proxy, parsed client-side. Best-effort: if a feed fails or
   the proxy is briefly down, that category just shows nothing —
   never breaks the rest of Pulse. Not curated or fact-checked by
   i3D Studio; shown as-is from public news sources.

   Region follows the subscriber's selected currency — INR shows
   India + global news, USD shows US + global, and so on — so an
   Indian and a US investor naturally see different regional news
   under the same G/R/D/E categories. ─────────────────────────── */
const NEWS_QUERIES_BY_CCY = {
  INR: {
    G: "gold price india",
    R: "real estate REIT india",
    D: "RBI bond yield interest rate",
    E: "sensex nifty stock market",
  },
  USD: {
    G: "gold price US",
    R: "real estate REIT US",
    D: "Fed bond yield interest rate",
    E: "S&P 500 dow jones stock market",
  },
  EUR: {
    G: "gold price europe",
    R: "real estate REIT europe",
    D: "ECB bond yield interest rate",
    E: "euro stoxx stock market europe",
  },
  GBP: {
    G: "gold price UK",
    R: "real estate REIT UK",
    D: "Bank of England bond yield interest rate",
    E: "FTSE 100 stock market UK",
  },
  AED: {
    G: "gold price UAE dubai",
    R: "real estate UAE dubai",
    D: "UAE central bank interest rate",
    E: "DFM ADX stock market UAE",
  },
};
const NEWS_GLOBAL_QUERIES = {
  G: "gold price global",
  R: "real estate global",
  D: "bond yield interest rate global",
  E: "stock market global",
};
// Google News "edition" (language/country) to match — improves relevance
// beyond just the query keywords, e.g. US edition surfaces US financial
// press more readily than searching "US" from the India edition would.
const NEWS_EDITION_BY_CCY = {
  INR: { hl: "en-IN", gl: "IN", ceid: "IN:en" },
  USD: { hl: "en-US", gl: "US", ceid: "US:en" },
  EUR: { hl: "en-IE", gl: "IE", ceid: "IE:en" },
  GBP: { hl: "en-GB", gl: "GB", ceid: "GB:en" },
  AED: { hl: "en-AE", gl: "AE", ceid: "AE:en" },
};
const CORS_PROXY = "https://api.allorigins.win/raw?url=";

async function fetchCategoryNews(cat, query, scope, limit, edition) {
  const ed = edition || NEWS_EDITION_BY_CCY.INR;
  const rssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(query)}&hl=${ed.hl}&gl=${ed.gl}&ceid=${ed.ceid}`;
  try {
    const res = await fetch(CORS_PROXY + encodeURIComponent(rssUrl), { cache: "no-store" });
    if (!res.ok) return [];
    const text = await res.text();
    const xml = new DOMParser().parseFromString(text, "text/xml");
    const items = Array.from(xml.querySelectorAll("item")).slice(0, limit);
    return items.map(item => {
      const title = item.querySelector("title")?.textContent || "";
      const pubDate = item.querySelector("pubDate")?.textContent || "";
      const link = item.querySelector("link")?.textContent || "";
      let source = "";
      try { source = new URL(link).hostname.replace("www.", ""); } catch(e) {}
      // Google News titles are usually "Headline - Source.com"; strip the trailing source
      const cleanTitle = title.replace(/\s-\s[^-]+$/, "");
      return { cat, scope, title: cleanTitle, source, pubDate, link };
    });
  } catch (e) {
    return [];
  }
}

async function fetchAllCategoryNews(ccy) {
  const regionQueries = NEWS_QUERIES_BY_CCY[ccy] || NEWS_QUERIES_BY_CCY.INR;
  const edition = NEWS_EDITION_BY_CCY[ccy] || NEWS_EDITION_BY_CCY.INR;
  const jobs = [];
  CATS.forEach(cat => {
    jobs.push(fetchCategoryNews(cat, regionQueries[cat], "regional", 1, edition));
    jobs.push(fetchCategoryNews(cat, NEWS_GLOBAL_QUERIES[cat], "global", 1, edition));
  });
  const results = await Promise.all(jobs);
  return results.flat();
}

/* ─── FIRE projection — purely arithmetic on user-supplied inputs.
   The growth rate is the USER's own assumption (adjustable slider),
   never a GRDE-stated "expected return" — kept illustrative only. ── */
function estimateYearsToTarget(current, monthlySip, annualRatePct, target) {
  if (target <= 0) return null;
  if (current >= target) return 0;
  const r = annualRatePct / 100 / 12;
  let bal = current;
  for (let m = 1; m <= 60 * 12; m++) {
    bal = bal * (1 + r) + monthlySip;
    if (bal >= target) return Math.round((m / 12) * 10) / 10;
  }
  return null; // beyond 60-year horizon
}

function DonutChart({ data, size = 180 }) {
  const cx = size / 2, cy = size / 2, r = size * 0.42, inner = size * 0.27;
  let cum = 0;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      {data.map(({ pct, color }, i) => {
        const sA = (cum / 100) * 360 - 90; cum += pct;
        const eA = (cum / 100) * 360 - 90;
        const s = { x: cx + r * Math.cos((sA * Math.PI) / 180), y: cy + r * Math.sin((sA * Math.PI) / 180) };
        const e = { x: cx + r * Math.cos((eA * Math.PI) / 180), y: cy + r * Math.sin((eA * Math.PI) / 180) };
        const la = pct > 50 ? 1 : 0;
        const iS = { x: cx + inner * Math.cos((eA * Math.PI) / 180), y: cy + inner * Math.sin((eA * Math.PI) / 180) };
        const iE = { x: cx + inner * Math.cos((sA * Math.PI) / 180), y: cy + inner * Math.sin((sA * Math.PI) / 180) };
        const d = `M ${s.x} ${s.y} A ${r} ${r} 0 ${la} 1 ${e.x} ${e.y} L ${iS.x} ${iS.y} A ${inner} ${inner} 0 ${la} 0 ${iE.x} ${iE.y} Z`;
        return <path key={i} d={d} fill={color} stroke="#0a1628" strokeWidth={2} />;
      })}
    </svg>
  );
}

function GaugeChart({ value, size = 240 }) {
  const cx = size / 2, cy = size * 0.58, r = size * 0.4;
  const segs = [
    { s: 180, e: 144, c: "#d97a6c" }, { s: 144, e: 108, c: "#d4a04b" },
    { s: 108, e: 72,  c: "#c8a84b" }, { s: 72,  e: 36,  c: "#7fa86b" },
    { s: 36,  e: 0,   c: "#6bb88a" },
  ];
  const ang = 180 - (Math.max(0, Math.min(100, value)) / 100) * 180;
  const rad = (ang * Math.PI) / 180;
  const nx = cx + (r - 14) * Math.cos(rad);
  const ny = cy - (r - 14) * Math.sin(rad);
  return (
    <svg width={size} height={size * 0.7} viewBox={`0 0 ${size} ${size * 0.7}`}>
      {segs.map((g, i) => {
        const a1 = ((180 - g.s) * Math.PI) / 180, a2 = ((180 - g.e) * Math.PI) / 180;
        const x1 = cx + r * Math.cos(a1), y1 = cy - r * Math.sin(a1);
        const x2 = cx + r * Math.cos(a2), y2 = cy - r * Math.sin(a2);
        return <path key={i} d={`M ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2}`} fill="none" stroke={g.c} strokeWidth={11} strokeLinecap="round" />;
      })}
      <line x1={cx} y1={cy} x2={nx} y2={ny} stroke="var(--gold-pale)" strokeWidth={2.5} strokeLinecap="round" />
      <circle cx={cx} cy={cy} r={5} fill="var(--gold)" />
    </svg>
  );
}

  const [targetCorpus, setTargetCorpus] = useState(saved?.targetCorpus ?? "");
  const [monthlySip, setMonthlySip] = useState(saved?.monthlySip ?? "");
  const [assumedRate, setAssumedRate] = useState(saved?.assumedRate ?? 11);
  const [currentAge, setCurrentAge] = useState(saved?.currentAge ?? 35);

    try { localStorage.setItem(GOALS_KEY, JSON.stringify({ targetCorpus, monthlySip, assumedRate, currentAge })); } catch(e) {}
  }, [targetCorpus, monthlySip, assumedRate, currentAge]);

  const target = Number(targetCorpus) || 0;

/* ─── TAB: PORTFOLIO TRACKER ─────────────────────────────── */
function TrackerTab() {
  const loadSaved = () => {
    try { const s = localStorage.getItem(TRACKER_KEY); if (s) return JSON.parse(s); } catch(e) {}
    return null;
  };
  const saved = loadSaved();
  const [totalPortfolio, setTotalPortfolio] = useState(saved?.totalPortfolio ?? "");
  const [age, setAge] = useState(saved?.age ?? 50);
  const [values, setValues] = useState(saved?.values ?? {});
  const [customNames, setCustomNames] = useState(saved?.customNames ?? {});
  const [reportDate, setReportDate] = useState(saved?.reportDate ?? new Date().toISOString().slice(0, 7));
  const [saveStatus, setSaveStatus] = useState("");
  const [focusedId, setFocusedId] = useState(null);
  const [focusedNameId, setFocusedNameId] = useState(null);

  useEffect(() => {
    try {
      localStorage.setItem(TRACKER_KEY, JSON.stringify({ totalPortfolio, age, values, customNames, reportDate }));
      setSaveStatus("✓ Saved"); const t = setTimeout(() => setSaveStatus(""), 1200); return () => clearTimeout(t);
    } catch (e) {}
  }, [totalPortfolio, age, values, customNames, reportDate]);

  const alloc = getAllocation(age);
  const total = Number(totalPortfolio) || 0;

  // Sum of whatever's actually been entered per-holding, computed first so
  // we can use it as the target-basis fallback when "Total Portfolio Value"
  // above is left blank — otherwise every row's Target shows blank and
  // Variance just mirrors Current with nothing to compare against.
  const rawCurrentSum = ASSET_TEMPLATE.reduce((s, a) => s + (Number(values[a.id]) || 0), 0);
  const effectiveTotal = total > 0 ? total : rawCurrentSum;

  const assets = ASSET_TEMPLATE.map(a => {
    const finalPct = alloc[a.cat] * a.catFrac;       // % of total portfolio
    const targetVal = effectiveTotal * finalPct / 100;
    const currentVal = Number(values[a.id]) || 0;
    const variance = currentVal - targetVal;
    const name = customNames[a.id] || a.name;
    return { ...a, name, finalPct, targetVal, currentVal, variance };
  });

  const actualTotal = assets.reduce((s, a) => s + a.currentVal, 0);

  /* 3-tier colour coding for variance: green (on-track), yellow (watch), red (act).
     Deviation measured as % of the total portfolio, matching Split % scale. */
  const varianceDenom = total > 0 ? total : actualTotal;
  const varianceColor = (a) => {
    if (a.currentVal === 0) return "var(--text-dim)";
    const pctDev = varianceDenom > 0 ? Math.abs(a.variance) / varianceDenom * 100 : 0;
    if (pctDev < 1) return "var(--good)";
    if (pctDev < 3) return "var(--gold)";
    return "var(--danger)";
  };

  // Use the actual sum of entered holdings when it's available; only fall
  // back to the user-typed portfolio value when nothing has been entered yet.
  // This lets the G/R/D/E summary cards reflect the tracker inputs even when
  // the "Total Portfolio Value" field is left blank.
  const denom = actualTotal > 0 ? actualTotal : total;

  const catSummary = {};
  CATS.forEach(cat => {
    const ca = assets.filter(a => a.cat === cat);
    const cT = ca.reduce((s, a) => s + a.currentVal, 0);
    const tT = ca.reduce((s, a) => s + a.targetVal, 0);
    const tP = alloc[cat];
    const cP = denom > 0 ? (cT / denom) * 100 : 0;
    catSummary[cat] = { currentTotal: cT, targetTotal: tT, targetPct: tP, currentPct: cP, diff: cP - tP };
  });

  const handleVal = (id, v) => setValues(prev => ({ ...prev, [id]: v }));
  const handleName = (id, v) => setCustomNames(prev => ({ ...prev, [id]: v }));

  /* Show raw editable text while focused; 2-decimal formatted text once blurred. */
  const displayVal = (id, rawSourceVal) => {
    const raw = inrToInput(rawSourceVal);
    if (raw === "") return "";
    if (focusedId === id) return String(raw);
    return Number(raw).toFixed(2);
  };
  const sanitizeNum = (str) => {
    let cleaned = str.replace(/[^0-9.]/g, "");
    const parts = cleaned.split(".");
    if (parts.length > 2) cleaned = parts[0] + "." + parts.slice(1).join("");
    return cleaned;
  };

  const reportRef = useRef(null);

  const printReport = () => {
    const node = reportRef.current;
    if (!node) { window.print(); return; }
    // Snapshot the live report (with current input values) into a preview window
    const clone = node.cloneNode(true);
    // Replace inputs/selects with their current values as plain text
    clone.querySelectorAll("input, select, textarea").forEach(el => {
      const span = document.createElement("span");
      span.textContent = el.value || el.getAttribute("placeholder") || "—";
      span.style.cssText = "font-family:'JetBrains Mono',monospace;font-size:12px;color:#1a1a1a;border-bottom:1px solid #bbb;padding:2px 6px;display:inline-block;min-width:60px;";
      el.parentNode.replaceChild(span, el);
    });
    // Strip interactive buttons inside the report (Clear data, Print button itself, etc.)
    clone.querySelectorAll("button").forEach(b => b.remove());

    const w = window.open("", "_blank", "width=900,height=1000");
    if (!w) { alert("Please allow pop-ups to preview the report."); return; }
    w.document.write(`<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>GRDE Report Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}

  .toolbar{position:sticky;top:0;z-index:10;background:#0a1628;color:#e8d49a;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,0.2);}
  .toolbar .title{font-family:'Cinzel',serif;letter-spacing:0.18em;text-transform:uppercase;font-size:13px;}
  .toolbar .hint{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.14em;color:#8a8a8a;text-transform:uppercase;margin-left:16px;}
  .toolbar button{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;border:none;border-radius:6px;padding:9px 18px;cursor:pointer;margin-left:8px;}
  .btn-print{background:linear-gradient(180deg,#c8a84b,#896e2f);color:#0a1628;font-weight:600;}
  .btn-cancel{background:transparent;color:#b8c0cc;border:1px solid #2a3a4a !important;}
  .page{max-width:780px;margin:24px auto;background:#fff;padding:32px 36px;box-shadow:0 4px 24px rgba(0,0,0,0.12);}
  h1,h2,h3,h4{font-family:'Cinzel',serif;color:#1a1a1a;}
  .mono{font-family:'JetBrains Mono',monospace;color:#555;}
  .glass{background:#fff !important;border:1px solid #d4d4d4 !important;border-radius:10px;}
  @media print{
    @page{size:A4;margin:14mm 12mm;}

    /* Keep individual rows intact */
    .glass > div{page-break-inside:avoid;break-inside:avoid;}
  }
</style>
</head><body>
<div class="toolbar">
  <div><span class="title">Print Preview</span><span class="hint">Review the layout below — then export</span></div>
  <div>
    <button class="btn-cancel" onclick="window.close()">Cancel</button>
    <button class="btn-print" onclick="window.print()">Print / Save PDF</button>
  </div>
</div>
<div class="page" id="preview-body"></div>
</body></html>`);
    w.document.close();
    // Inject the cloned node after the document is ready
    const mount = () => {
      const target = w.document.getElementById("preview-body");
      if (target) target.appendChild(clone);
    };
    if (w.document.readyState === "complete") mount();
    else w.addEventListener("load", mount);
  };

  const inputStyle = {
    width: "100%", background: "var(--bg)", border: "1px solid var(--border-2)", borderRadius: 8,
    padding: "10px 14px", color: "var(--white)", fontFamily: "Inter", fontSize: 13, outline: "none", boxSizing: "border-box"
  };

  /* ─── Export / Import for cross-device sync ─── */
  const fileInputRef = useRef(null);

  const handleExport = () => {
    const payload = { totalPortfolio, age, values, reportDate, exportedAt: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `grde-backup-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const handleImportClick = () => { if (fileInputRef.current) fileInputRef.current.click(); };

  const handleImportFile = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!window.confirm("Import this data? It will replace your current tracker entries on this device.")) return;

      }

    reader.readAsText(file);
    e.target.value = ""; // allow re-importing same file name later
  };

    <div ref={reportRef}>
      <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", flexWrap: "wrap", gap: 16 }}>
        <div>
          <div className="label">Portfolio Tracker</div>

          </h2>
          <p style={{ fontSize: 12, color: "var(--text-dim)", margin: 0, maxWidth: 480 }}>

          </p>

        <div style={{ display: "flex", alignItems: "center", gap: 10, marginTop: 6, flexWrap: "wrap" }}>

              background: "transparent", border: "1px solid var(--gold-dim)", borderRadius: 8,

            }}>⬇ Export</button>
          <button onClick={handleImportClick}
            className="mono" style={{
              background: "transparent", border: "1px solid var(--gold-dim)", borderRadius: 8,
              padding: "8px 14px", color: "var(--gold-pale)", fontSize: 10, letterSpacing: "0.16em",
              textTransform: "uppercase", cursor: "pointer"
            }}>⬆ Import</button>
          <button onClick={() => { if (window.confirm("Clear all saved data?")) { localStorage.removeItem(TRACKER_KEY); setTotalPortfolio(""); setAge(50); setValues({}); setReportDate(new Date().toISOString().slice(0, 7)); } }}
            className="mono" style={{
              background: "transparent", border: "1px solid var(--border-2)", borderRadius: 8,
              padding: "8px 14px", color: "var(--text-dim)", fontSize: 10, letterSpacing: "0.16em",
              textTransform: "uppercase", cursor: "pointer"

      <div className="mono" style={{ fontSize: 9, color: "var(--text-dim)", letterSpacing: "0.1em", marginBottom: 10 }}>
        📱💻 Data saved here stays only on this device. Use <span style={{ color: "var(--gold-pale)" }}>Export</span> on one device
        and <span style={{ color: "var(--gold-pale)" }}>Import</span> on another to keep them in sync.
      </div>

      <div style={{ display: "flex", gap: 14, margin: "18px 0", flexWrap: "wrap" }}>
        <div style={{ flex: "1 1 240px" }}>
          <label className="mono" style={{ fontSize: 9, color: "var(--text-dim)", letterSpacing: "0.18em", textTransform: "uppercase", display: "block", marginBottom: 6 }}>Total Portfolio Value ({ccySym()})</label>
          <input type="text" inputMode="decimal" value={displayVal("TOTAL", totalPortfolio)}
            onChange={e => setTotalPortfolio(inputToInr(sanitizeNum(e.target.value)))}
            onFocus={() => setFocusedId("TOTAL")}
            onBlur={() => setFocusedId(null)}
            placeholder={CCY === "INR" ? "e.g. 3500000" : `e.g. ${Math.round(3500000 / CURRENCIES[CCY].rate)}`}
            style={inputStyle} />
        </div>
        <div style={{ flex: "0 0 130px" }}>
          <label className="mono" style={{ fontSize: 9, color: "var(--text-dim)", letterSpacing: "0.18em", textTransform: "uppercase", display: "block", marginBottom: 6 }}>Your Age</label>
          <input type="number" min={25} max={100} value={age} onChange={e => setAge(Number(e.target.value))}
            onFocus={e => e.target.select()} style={inputStyle} />
        </div>
        <div style={{ flex: "0 0 160px" }}>
          <label className="mono" style={{ fontSize: 9, color: "var(--text-dim)", letterSpacing: "0.18em", textTransform: "uppercase", display: "block", marginBottom: 6 }}>Report Month</label>
          <input type="month" value={reportDate} onChange={e => setReportDate(e.target.value)} style={inputStyle} />
        </div>
      </div>

      <div className="glass" style={{ borderRadius: 12, overflow: "hidden" }}>
        <div style={{
          display: "grid", gridTemplateColumns: "28px 1fr 110px 110px 70px 110px",
          gap: 8, padding: "10px 16px", background: "var(--card-2)", alignItems: "center"
        }}>
          {["", "Sub-Category", `Current (${ccySym()})`, `Target (${ccySym()})`, "Split %", "Variance"].map((h, i) => (
            <div key={i} className="mono" style={{
              fontSize: 9, color: "var(--gold)", letterSpacing: "0.18em", textTransform: "uppercase",
              textAlign: i >= 2 ? "right" : "left"
            }}>{h}</div>
          ))}
        </div>

        {CATS.map(cat => (
          <div key={cat}>
            <div style={{
              display: "flex", alignItems: "center", gap: 12, padding: "12px 16px",
              background: "#0f1620ee", backdropFilter: "blur(4px)",
              borderTop: "1px solid var(--border)", borderBottom: "1px solid var(--border)",
              position: "sticky", top: 0, zIndex: 5
            }}>
              <span style={{ fontFamily: "Cinzel", fontSize: 18, color: CAT_META[cat].hex, fontWeight: 600 }}>{cat}</span>
              <span className="mono" style={{ fontSize: 11, color: "var(--white)", letterSpacing: "0.14em", textTransform: "uppercase" }}>
                {CAT_META[cat].label} ({alloc[cat]}%)
              </span>
              <span className="mono" style={{ fontSize: 9, color: "var(--text-dim)", marginLeft: "auto", letterSpacing: "0.18em", textTransform: "uppercase" }}>
                {CAT_META[cat].tag}
              </span>
            </div>

            {assets.filter(a => a.cat === cat).map((a, i) => (
              <div key={a.id} style={{
                display: "grid", gridTemplateColumns: "28px 1fr 110px 110px 70px 110px",
                gap: 8, padding: "10px 16px", alignItems: "center",
                background: i % 2 === 0 ? "transparent" : "rgba(15,31,58,0.4)",
                borderTop: "1px solid rgba(30,58,95,0.5)"
              }}>
                <div><div style={{ width: 8, height: 8, borderRadius: "50%", background: CAT_META[cat].hex }} /></div>
                <div>
                  <input
                    type="text" value={customNames[a.id] ?? ""} placeholder={a.name}
                    onChange={e => handleName(a.id, e.target.value)}
                    onFocus={e => { setFocusedNameId(a.id); e.target.select(); }}
                    onBlur={() => setFocusedNameId(null)}
                    style={{
                      width: "100%", background: "transparent",
                      border: focusedNameId === a.id ? "1px solid var(--gold-dim)" : "1px solid transparent",
                      borderRadius: 5, padding: "2px 5px", margin: "-2px -5px",
                      color: "var(--white)", fontFamily: "inherit", fontSize: 12, fontWeight: 500,
                      outline: "none", boxSizing: "border-box"
                    }} />
                  <div style={{ fontSize: 10, color: "var(--text-dim)", marginTop: 2 }}>{a.desc}</div>
                </div>
                <div>
                  <input type="text" inputMode="decimal" value={displayVal(a.id, values[a.id])}
                    onChange={e => handleVal(a.id, inputToInr(sanitizeNum(e.target.value)))} placeholder="0"
                    onFocus={() => setFocusedId(a.id)}
                    onBlur={() => setFocusedId(null)}
                    style={{
                      width: "100%", background: "var(--bg)", border: "1px solid var(--border)", borderRadius: 6,
                      padding: "6px 8px", color: "var(--white)", fontFamily: "JetBrains Mono", fontSize: 11,
                      textAlign: "right", outline: "none", boxSizing: "border-box"
                    }}
                    onFocusCapture={e => e.currentTarget.style.borderColor = "var(--gold)"}
                    onBlurCapture={e => e.currentTarget.style.borderColor = "var(--border)"} />
                </div>
                <div className="mono" style={{ fontSize: 11, color: "var(--text)", textAlign: "right" }}>
                  {effectiveTotal > 0 ? fmtINR(a.targetVal) : "—"}
                </div>
                <div className="mono" style={{ fontSize: 11, color: "var(--text-dim)", textAlign: "right" }}>
                  {a.finalPct.toFixed(2)}%
                </div>
                <div className="mono" style={{
                  fontWeight: 500, fontSize: 11, textAlign: "right",
                  color: varianceColor(a)
                }}>
                  {a.currentVal > 0 ? `${a.variance >= 0 ? "+" : ""}${fmtINR(a.variance)}` : "—"}
                </div>
              </div>
            ))}
          </div>
        ))}

        <div style={{
          display: "grid", gridTemplateColumns: "28px 1fr 110px 110px 70px 110px",
          gap: 8, padding: "14px 16px", background: "var(--card-2)",
          borderTop: "2px solid var(--gold-dim)", alignItems: "center"
        }}>
          <div />
          <div className="mono" style={{ fontWeight: 600, fontSize: 11, color: "var(--gold)", letterSpacing: "0.2em", textTransform: "uppercase" }}>Total</div>
          <div className="mono" style={{ fontWeight: 600, fontSize: 12, color: "var(--white)", textAlign: "right" }}>{fmtINR(actualTotal)}</div>
          <div className="mono" style={{ fontWeight: 500, fontSize: 12, color: "var(--text)", textAlign: "right" }}>{fmtINR(total)}</div>
          <div className="mono" style={{ fontSize: 11, color: "var(--text-dim)", textAlign: "right" }}>100%</div>
          <div className="mono" style={{
            fontWeight: 600, fontSize: 12, textAlign: "right",
            color: actualTotal > 0 ? (actualTotal - total >= 0 ? "var(--good)" : "var(--danger)") : "var(--text-dim)"
          }}>{actualTotal > 0 ? fmtINR(actualTotal - total) : "—"}</div>
        </div>
      </div>

      <div style={{ display: "flex", gap: 10, marginTop: 18, flexWrap: "wrap" }}>
        {CATS.map(cat => {
          const s = catSummary[cat];
          return (
            <div key={cat} className="glass" style={{ flex: "1 1 160px", borderRadius: 10, padding: 14 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                <span style={{ fontFamily: "Cinzel", fontSize: 18, color: CAT_META[cat].hex, fontWeight: 600 }}>{cat}</span>
                <span className="mono" style={{ fontSize: 8, color: "var(--text-dim)", letterSpacing: "0.16em" }}>{CAT_META[cat].label}</span>
              </div>
              <div style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
                <span style={{ fontFamily: "Cinzel", fontWeight: 600, fontSize: 20, color: "var(--white)" }}>{s.currentPct.toFixed(1)}%</span>
                <span className="mono" style={{ fontSize: 10, color: s.diff >= 0 ? "var(--good)" : "var(--danger)" }}>
                  {s.diff >= 0 ? "+" : ""}{s.diff.toFixed(2)}%
                </span>
              </div>
              <div className="mono" style={{ fontSize: 9, color: "var(--text-dim)", marginTop: 4, letterSpacing: "0.14em" }}>TARGET {s.targetPct}%</div>
              <div style={{ width: "100%", height: 3, background: "var(--border)", borderRadius: 2, marginTop: 8, overflow: "hidden" }}>
                <div style={{ width: `${Math.min((s.currentPct / 65) * 100, 100)}%`, height: "100%", background: CAT_META[cat].hex, borderRadius: 2, transition: "width 0.4s" }} />
              </div>
            </div>
          );
        })}
      </div>

      <div style={{ textAlign: "center", marginTop: 26 }}>
        {(() => { const canPrint = total > 0 || actualTotal > 0; return (
        <button onClick={printReport} disabled={!canPrint} className="mono" style={{
          background: canPrint ? "linear-gradient(180deg, #c8a84b, #896e2f)" : "var(--card-2)",
          color: canPrint ? "#0a1628" : "var(--text-dim)",
          border: "none", borderRadius: 10, padding: "13px 36px", fontSize: 11, fontWeight: 600,
          letterSpacing: "0.22em", textTransform: "uppercase",
          cursor: canPrint ? "pointer" : "not-allowed",
          boxShadow: canPrint ? "0 6px 24px rgba(200,168,75,0.25)" : "none"
        }}>📄 Print / Save Report</button>
        ); })()}
        <div className="mono" style={{ fontSize: 9, color: "var(--text-dim)", marginTop: 8, letterSpacing: "0.14em", textTransform: "uppercase" }}>
          Use browser "Save as PDF" to share with your advisor
        </div>
      </div>
    </div>
  );
}

/* ─── TAB: ISR ANALYSIS ──────────────────────────────────── */
function ISRTab() {
  const initAge = (() => {
    try { const s = localStorage.getItem(TRACKER_KEY); if (s) return JSON.parse(s).age ?? 50; } catch(e) {}
    return 50;
  })();
  const [age, setAge] = useState(initAge);
  const alloc = getAllocation(age);
  const band  = getBand(age);
  const targetISR    = alloc.G + alloc.R + alloc.D;
  const targetGrowth = alloc.E;

  // Pull live tracker data — shared helper, same fallback fix as Dashboard
  const live = computeLiveTrackerData(age);
  const { liveAssets, liveCat, hasLiveData, trackerTotal } = live;
  const liveISR      = hasLiveData ? liveCat.G.curPct + liveCat.R.curPct + liveCat.D.curPct : null;
  const liveGrowth   = hasLiveData ? liveCat.E.curPct : null;

  // Health Score
  const healthScore = (() => {
    if (!hasLiveData) return null;
    let s = 100;
    CATS.forEach(cat => { s -= Math.abs(liveCat[cat].curPct - liveCat[cat].tgtPct) * 2; });
    return Math.max(0, Math.min(100, Math.round(s)));
  })();
  const healthLabel = s => {
    if (s===null) return { text:"No data", color:"var(--text-dim)" };
    if (s>=90) return { text:"Excellent", color:"var(--good)" };
    if (s>=75) return { text:"Well Structured", color:"#7fb86a" };
    if (s>=60) return { text:"Needs Attention", color:"var(--gold)" };
    return { text:"Rebalancing Required", color:"var(--danger)" };
  };
  const health = healthLabel(healthScore);

  // Rebalancing priority top 6
  const rebalPriority = hasLiveData
    ? [...liveAssets].filter(a=>a.targetVal>0).sort((a,b)=>Math.abs(b.variance)-Math.abs(a.variance)).slice(0,6)
    : [];

  // Age warnings
  const ageWarnings = CATS.map(cat => {
    if (!hasLiveData) return null;
    const diff = liveCat[cat].curPct - liveCat[cat].tgtPct;
    const abs  = Math.abs(diff);
    if (abs<2)   return { cat, status:"ok",    msg:`${CAT_META[cat].label} is on target at ${liveCat[cat].curPct.toFixed(1)}%` };
    if (diff>0)  return { cat, status:"over",  msg:`${CAT_META[cat].label} is ${abs.toFixed(1)}% above target — consider trimming` };
    return         { cat, status:"under", msg:`${CAT_META[cat].label} is ${abs.toFixed(1)}% below target — consider adding` };
  }).filter(Boolean);

  const isr    = hasLiveData ? liveISR    : targetISR;
  const growth = hasLiveData ? liveGrowth : targetGrowth;

  return (
    <div>
      <div className="label">Income–Stability Ratio</div>
      <h2 style={{ fontSize:30, margin:"8px 0 4px" }}>
        ISR <span style={{ color:"var(--gold)", fontStyle:"italic" }}>Analysis</span>
      </h2>
      <p style={{ fontSize:13, color:"var(--text)", margin:0 }}>
        ISR = (G + R + D) / Total — the stable / income portion of your portfolio.
        {hasLiveData && <span style={{ color:"var(--good)", marginLeft:8 }}>· Live data from your Tracker</span>}
        {!hasLiveData && <span style={{ color:"var(--gold)", marginLeft:8 }}>· Enter holdings in Tracker to see live analysis</span>}
      </p>

      {/* Gauge */}
      <div className="glass" style={{ borderRadius:12, padding:"22px 28px", margin:"20px 0", textAlign:"center" }}>
        <div className="label" style={{ textAlign:"left", marginBottom:14 }}>Portfolio Stability Gauge</div>
        <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:10 }}>
          <span className="mono" style={{ fontSize:9, color:"var(--text-dim)", letterSpacing:"0.18em" }}>AGE</span>
          <input type="range" min={25} max={100} value={age} onChange={e=>setAge(Number(e.target.value))} style={{ flex:1, cursor:"pointer", accentColor:"var(--gold)" }} />
          <span className="mono" style={{ fontWeight:600, fontSize:14, color:"var(--white)", background:"var(--bg)", border:"1px solid var(--border-2)", padding:"5px 14px", borderRadius:8, minWidth:36, textAlign:"center" }}>{age}</span>
        </div>
        <GaugeChart value={isr} size={280} />
        <div style={{ fontFamily:"Cinzel", fontWeight:600, fontSize:38, color:"var(--white)", marginTop:-16 }}>{isr.toFixed(1)}%</div>
        <div className="mono" style={{ fontSize:10, color:"var(--text-dim)", letterSpacing:"0.22em", textTransform:"uppercase" }}>Income–Stability Ratio</div>
        <div style={{ display:"flex", justifyContent:"space-between", marginTop:10 }}>
          <span className="mono" style={{ fontSize:10, color:"var(--danger)", letterSpacing:"0.18em" }}>VOLATILE</span>
          <span className="mono" style={{ fontSize:10, color:"var(--good)", letterSpacing:"0.18em" }}>STABLE</span>
        </div>
      </div>

      {/* Live ISR vs Target 4-col */}
      <div className="glass" style={{ borderRadius:12, overflow:"hidden", marginBottom:18 }}>
        <div style={{ padding:"12px 18px", borderBottom:"1px solid var(--border)", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <span className="mono" style={{ fontSize:11, color:"var(--white)", letterSpacing:"0.18em", textTransform:"uppercase" }}>ISR · Live vs Target</span>
          {hasLiveData && healthScore!==null && (
            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
              <span className="mono" style={{ fontSize:9, color:"var(--text-dim)" }}>HEALTH SCORE</span>
              <span className="mono" style={{ fontWeight:600, fontSize:14, color:health.color }}>{healthScore}/100</span>
              <span className="mono" style={{ fontSize:9, color:health.color }}>{health.text}</span>
            </div>
          )}
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr" }}>
          {[
            { label:"Live ISR",      value:hasLiveData?liveISR.toFixed(1)+"%":"—",     sub:"G+R+D actual",    color:"var(--good)" },
            { label:"Target ISR",    value:targetISR+"%",                                    sub:`Band ${band}`,    color:"var(--gold)" },
            { label:"Live Growth",   value:hasLiveData?liveGrowth.toFixed(1)+"%":"—",  sub:"E actual",        color:"var(--gold)" },
            { label:"Target Growth", value:targetGrowth+"%",                                 sub:`Band ${band}`,    color:"var(--text-dim)" },
          ].map((item,i)=>(
            <div key={i} style={{ padding:"20px 16px", textAlign:"center", borderRight:i<3?"1px solid var(--border)":"none", background:i%2===0?"transparent":"rgba(15,31,58,0.3)" }}>
              <div className="mono" style={{ fontSize:9, color:"var(--text-dim)", letterSpacing:"0.14em", textTransform:"uppercase", marginBottom:8 }}>{item.label}</div>
              <div style={{ fontFamily:"Cinzel", fontWeight:600, fontSize:26, color:item.color }}>{item.value}</div>
              <div className="mono" style={{ fontSize:9, color:"var(--text-dim)", marginTop:6 }}>{item.sub}</div>
              {hasLiveData&&i===0&&<div className="mono" style={{ fontSize:9, marginTop:6, color:liveISR>=targetISR?"var(--good)":"var(--danger)" }}>{liveISR>=targetISR?`+${(liveISR-targetISR).toFixed(1)}% above`:`${(liveISR-targetISR).toFixed(1)}% below`} target</div>}
            </div>
          ))}
        </div>
      </div>

      {/* Category cards */}
      <div style={{ display:"flex", gap:14, marginBottom:18, flexWrap:"wrap" }}>
        {CATS.map(cat => {
          const curPct = hasLiveData?liveCat[cat].curPct:alloc[cat];
          const tgtPct = alloc[cat];
          const diff   = curPct - tgtPct;
          return (
            <div key={cat} className="glass" style={{ flex:"1 1 180px", borderRadius:12, padding:"18px 16px", textAlign:"center" }}>
              <div style={{ fontFamily:"Cinzel", fontSize:22, color:CAT_META[cat].hex, fontWeight:600 }}>{cat}</div>
              <div style={{ fontFamily:"Cinzel", fontWeight:600, fontSize:28, color:"var(--white)", margin:"8px 0 2px" }}>{curPct.toFixed(1)}%</div>
              <div className="mono" style={{ fontSize:9, color:"var(--text-dim)" }}>Target {tgtPct}%</div>
              {hasLiveData && <div className="mono" style={{ fontSize:10, marginTop:6, fontWeight:600, color:Math.abs(diff)<2?"var(--good)":diff>0?"var(--gold)":"var(--danger)" }}>{diff>=0?"+":""}{diff.toFixed(2)}%</div>}
              <div style={{ width:"70%", height:3, background:"var(--border)", borderRadius:2, margin:"8px auto 0", overflow:"hidden" }}>
                <div style={{ width:`${Math.min((curPct/65)*100,100)}%`, height:"100%", background:CAT_META[cat].hex, borderRadius:2 }} />
              </div>
            </div>
          );
        })}
      </div>

      {/* Age Appropriateness */}
      {hasLiveData && (
        <div className="glass" style={{ borderRadius:12, overflow:"hidden", marginBottom:18 }}>
          <div style={{ padding:"12px 18px", borderBottom:"1px solid var(--border)" }}>
            <span className="mono" style={{ fontSize:11, color:"var(--white)", letterSpacing:"0.18em", textTransform:"uppercase" }}>Age Appropriateness · Band {band}</span>
          </div>
          <div style={{ padding:"14px 18px", display:"flex", flexDirection:"column", gap:10 }}>
            {ageWarnings.map((w,i)=>(
              <div key={i} style={{ display:"flex", alignItems:"center", gap:12 }}>
                <div style={{ width:8, height:8, borderRadius:"50%", flexShrink:0, background:w.status==="ok"?"var(--good)":w.status==="over"?"var(--gold)":"var(--danger)" }} />
                <span className="mono" style={{ fontSize:10, color:CAT_META[w.cat].hex }}>{w.cat}</span>
                <span style={{ fontSize:12, color:w.status==="ok"?"var(--good)":w.status==="over"?"var(--gold)":"var(--danger)" }}>{w.status==="ok"?"✓":w.status==="over"?"▲":"▼"}</span>
                <span style={{ fontSize:12, color:"var(--text)" }}>{w.msg}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Rebalancing Priority */}
      {hasLiveData && rebalPriority.length>0 && (
        <div className="glass" style={{ borderRadius:12, overflow:"hidden", marginBottom:18 }}>
          <div style={{ padding:"12px 18px", borderBottom:"1px solid var(--border)" }}>
            <span className="mono" style={{ fontSize:11, color:"var(--white)", letterSpacing:"0.18em", textTransform:"uppercase" }}>Rebalancing Priority</span>
            <span className="mono" style={{ fontSize:9, color:"var(--text-dim)", marginLeft:12 }}>Ranked by variance · Top 6</span>
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"24px 1fr 80px 90px 90px 70px", gap:8, padding:"8px 18px", background:"var(--card-2)" }}>
            {["","Asset","Cat","Current","Target","Action"].map((h,i)=>(
              <div key={i} className="mono" style={{ fontSize:9, color:"var(--text-dim)", letterSpacing:"0.14em", textTransform:"uppercase", textAlign:i>=3?"right":"left" }}>{h}</div>
            ))}
          </div>
          {rebalPriority.map((a,i)=>{
            const action=a.variance<-1000?"BUY":a.variance>1000?"TRIM":"HOLD";
            const ac=action==="BUY"?"var(--good)":action==="TRIM"?"var(--danger)":"var(--gold)";
            return (
              <div key={i} style={{ display:"grid", gridTemplateColumns:"24px 1fr 80px 90px 90px 70px", gap:8, padding:"10px 18px", alignItems:"center", borderTop:"1px solid var(--border)", background:i%2===0?"transparent":"rgba(15,31,58,0.3)" }}>
                <div className="mono" style={{ fontSize:9, color:"var(--text-dim)" }}>{i+1}</div>
                <div>
                  <div style={{ fontSize:12, color:"var(--white)" }}>{a.name}</div>
                  <div className="mono" style={{ fontSize:9, color:"var(--text-dim)", marginTop:2 }}>{a.desc}</div>
                </div>
                <div><span style={{ fontFamily:"Cinzel", fontSize:11, fontWeight:600, color:CAT_META[a.cat].hex, background:`${CAT_META[a.cat].hex}18`, padding:"2px 8px", borderRadius:4 }}>{a.cat}</span></div>
                <div className="mono" style={{ fontSize:11, color:"var(--text)", textAlign:"right" }}>{fmtINR(a.currentVal)}</div>
                <div className="mono" style={{ fontSize:11, color:"var(--text-dim)", textAlign:"right" }}>{fmtINR(a.targetVal)}</div>
                <div style={{ textAlign:"right" }}><span className="mono" style={{ fontSize:9, fontWeight:600, color:ac, background:`${ac}18`, border:`1px solid ${ac}`, borderRadius:4, padding:"3px 8px" }}>{action}</span></div>
              </div>
            );
          })}
        </div>
      )}

      {/* No data notice */}
      {!hasLiveData && (
        <div className="glass" style={{ borderRadius:12, padding:"28px 24px", textAlign:"center", marginBottom:18 }}>
          <div style={{ fontSize:28, marginBottom:10, opacity:0.4 }}>📊</div>
          <div className="mono" style={{ fontSize:11, color:"var(--text-dim)", letterSpacing:"0.14em", lineHeight:1.8 }}>
            Live ISR, rebalancing priorities and age warnings appear<br/>once you enter holdings in the <strong style={{ color:"var(--gold)" }}>Portfolio Tracker</strong>.
          </div>
        </div>
      )}

      {/* Age Matrix with ISR column */}
      <div className="glass" style={{ borderRadius:12, overflow:"hidden" }}>
        <div style={{ padding:"14px 18px", borderBottom:"1px solid var(--border)", display:"flex", alignItems:"center", gap:12 }}>
          <span className="mono" style={{ fontSize:11, color:"var(--white)", letterSpacing:"0.18em", textTransform:"uppercase" }}>Age-Based Allocation Matrix</span>
          <span className="mono" style={{ fontSize:10, color:"var(--gold)", letterSpacing:"0.16em" }}>CURRENT BAND · {band}</span>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"100px 1fr 1fr 1fr 1fr 70px", padding:"10px 18px", background:"var(--card-2)" }}>
          {["Age Band","G (Gold)","R (Real Est.)","D (Debt)","E (Equity)","ISR"].map((h,i)=>(
            <div key={i} className="mono" style={{ fontSize:9, letterSpacing:"0.18em", textTransform:"uppercase", color:["var(--text-dim)","var(--g-color)","var(--r-color)","var(--d-color)","var(--e-color)","var(--text-dim)"][i] }}>{h}</div>
          ))}
        </div>
        {AGE_BANDS.map((row,i)=>{
          const cur=row.range===band;
          return (
            <div key={i} style={{ display:"grid", gridTemplateColumns:"100px 1fr 1fr 1fr 1fr 70px", padding:"9px 18px", background:cur?"rgba(200,168,75,0.08)":i%2===0?"transparent":"rgba(15,31,58,0.4)", borderLeft:cur?"3px solid var(--gold)":"3px solid transparent" }}>
              <div className="mono" style={{ fontWeight:cur?500:400, fontSize:11, color:cur?"var(--gold)":"var(--text)", letterSpacing:"0.12em" }}>{cur?"▸ ":""}{row.range}</div>
              {CATS.map(cat=>(<div key={cat} className="mono" style={{ fontWeight:cur?500:400, fontSize:11, color:cur?"var(--white)":"var(--text)" }}>{row[cat]}%</div>))}
              <div className="mono" style={{ fontWeight:cur?500:400, fontSize:11, color:cur?"var(--good)":"var(--text-dim)" }}>{row.G+row.R+row.D}%</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}
/* ─── MAIN APP ───────────────────────────────────────────── */
function GRDEApp() {
  const [activeTab, setActiveTab] = useState("allocator");
  const [unlock, setUnlock] = useState(() => {
    try { return localStorage.getItem(UNLOCK_KEY) || ""; } catch(e) { return ""; }
  });
  const [currency, setCurrency] = useState(CCY);
  const [tickerAlerts, setTickerAlerts] = useState(FALLBACK_ALERTS);
  const [showOnboarding, setShowOnboarding] = useState(() => {
    try { return localStorage.getItem(ONBOARD_KEY) !== "1"; } catch(e) { return true; }
  });
  const isUnlocked = !!unlock;
  const isOwner = unlock === "owner";

  useEffect(() => {
    const loadTicker = () => {
      fetch(ALERTS_URL + `&cb=${Date.now()}`, { cache: "no-store" })
        .then(r => r.text())
        .then(t => { const p = parseCSV(t); if (p.length) setTickerAlerts(p); })
        .catch(() => {});
    };
    loadTicker();
    const t = setInterval(loadTicker, 5 * 60 * 1000);
    return () => clearInterval(t);
  }, []);

  const handleUnlock = (kind) => {
    setUnlock(kind);
    try { localStorage.setItem(UNLOCK_KEY, kind); } catch(e) {}
  };
  const handleLock = () => {
    if (window.confirm("Lock the session? You'll need your access code to re-enter Tracker / ISR.")) {
      setUnlock(""); try { localStorage.removeItem(UNLOCK_KEY); } catch(e) {}
    }
  };
  const handleCurrencyChange = (c) => { setCCY(c); setCurrency(c); };

  return (
    <div>
      {showOnboarding && <Onboarding onComplete={() => setShowOnboarding(false)} />}
      <Header unlocked={isUnlocked} onLock={handleLock}
              currency={currency} onCurrencyChange={handleCurrencyChange} />
      <main className="grde-main" style={{ maxWidth: 980, margin: "0 auto", padding: "24px 24px 40px" }}>
        {/* Hero band — echoes grde.in marketing site */}
        <section className="grde-hero" style={{ padding: "18px 0 28px", textAlign: "left" }}>
          <div className="mono" style={{
            display: "inline-block", fontSize: 10, letterSpacing: "0.22em", textTransform: "uppercase",
            color: "var(--gold-pale)", background: "rgba(212,168,67,0.08)",
            border: "1px solid var(--gold-dim)", borderRadius: 999, padding: "4px 12px"
          }}>· The Beaver Dam Method</div>
          <h1 className="serif" style={{
            fontSize: "clamp(28px, 4.5vw, 44px)", lineHeight: 1.1, marginTop: 14,
            color: "var(--white)", fontWeight: 500, letterSpacing: "0.005em"
          }}>
            GRDE Portfolio{" "}
            <span style={{ color: "var(--gold)", fontStyle: "italic", fontWeight: 600 }}>Engine</span>
          </h1>
          <div style={{
            marginTop: 10, color: "var(--text-dim)",
            fontSize: 15, fontFamily: "'Cinzel', serif", letterSpacing: "0.02em"
          }}>
            An Architect's Blueprint to <span style={{ color: "var(--gold-pale)", fontStyle: "italic" }}>Wealth Creation</span>
          </div>
          <div style={{
            marginTop: 6, fontStyle: "italic", color: "var(--text-dim)",
            fontSize: 12.5, fontFamily: "'Cinzel', serif", letterSpacing: "0.02em", opacity: 0.8
          }}>
            "Don't hoard like a squirrel. Build like a beaver."
          </div>
        </section>

        <TabBar active={activeTab} onChange={setActiveTab} isUnlocked={isUnlocked} isOwner={isOwner} />

        <div style={{ marginTop: 26, position: "relative" }}>
          {activeTab === "dashboard" && (
            <div style={{ position: "relative", minHeight: 460 }}>
              <div style={{ filter: isUnlocked ? "none" : "blur(7px)", pointerEvents: isUnlocked ? "auto" : "none" }}>
                <DashboardTab onNavigate={setActiveTab} />
              </div>
              {!isUnlocked && <LockOverlay onUnlock={handleUnlock} />}
            </div>
          )}

          {activeTab === "allocator" && <AllocatorTab />}

          {activeTab === "tracker" && (
            <div style={{ position: "relative", minHeight: 460 }}>
              <div style={{ filter: isUnlocked ? "none" : "blur(7px)", pointerEvents: isUnlocked ? "auto" : "none" }}>
                <TrackerTab />
              </div>
              {!isUnlocked && <LockOverlay onUnlock={handleUnlock} />}
            </div>
          )}

          {activeTab === "isr" && (
            <div style={{ position: "relative", minHeight: 460 }}>
              <div style={{ filter: isUnlocked ? "none" : "blur(7px)", pointerEvents: isUnlocked ? "auto" : "none" }}>
                <ISRTab />
              </div>
              {!isUnlocked && <LockOverlay onUnlock={handleUnlock} />}
            </div>
          )}

          {activeTab === "codes" && isOwner && <CodesTab />}

          {activeTab === "pulse" && (
            <div style={{ position: "relative", minHeight: 460 }}>
              <div style={{ filter: isUnlocked ? "none" : "blur(7px)", pointerEvents: isUnlocked ? "auto" : "none" }}>
                <PulseTab currency={currency} />
              </div>
              {!isUnlocked && <LockOverlay onUnlock={handleUnlock} />}
            </div>
          )}
        </div>

        {/* Footer */}
        <footer style={{ marginTop: 40, paddingTop: 20, borderTop: "1px solid var(--border)" }}>
          <div style={{ display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: 12, marginBottom: 14 }}>
            <span className="mono" style={{ fontSize: 10, color: "var(--text-dim)", letterSpacing: "0.16em", textTransform: "uppercase" }}>
              GRDE Engine v3.0 · An Architect's Blueprint for Wealth
            </span>
            <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
              <button onClick={() => setShowOnboarding(true)} className="mono" style={{
                background: "transparent", border: "none", color: "var(--gold-pale)", fontSize: 10,
                letterSpacing: "0.12em", cursor: "pointer", textDecoration: "underline", textUnderlineOffset: 3
              }}>Replay intro</button>
              <span className="mono" style={{ fontSize: 10, color: "var(--text-dim)", letterSpacing: "0.14em" }}>
                by Shakhith A.M.  ·  i3D Studio, Coimbatore
              </span>
            </div>
          </div>
          <div style={{
            background: "rgba(15,31,58,0.5)", border: "1px solid var(--border)",
            borderLeft: "3px solid var(--gold-dim)", borderRadius: 6, padding: "12px 16px"
          }}>
            <div className="mono" style={{ fontSize: 9, color: "var(--gold)", letterSpacing: "0.22em", textTransform: "uppercase", marginBottom: 6 }}>
              Disclaimer
            </div>
            <p style={{ fontSize: 11, color: "var(--text-dim)", lineHeight: 1.7, margin: 0 }}>
              GRDE is an <strong style={{ color: "var(--text)" }}>educational portfolio planning framework</strong>.
              All projections, illustrations, and scenario analyses are mathematical examples based on
              user-provided assumptions and <strong style={{ color: "var(--text)" }}>should not be construed as
              investment advice or guarantees of future performance</strong>. Investments are subject to market
              risks. Always consult a <strong style={{ color: "var(--text)" }}>SEBI-registered advisor</strong> before investing.
            </p>
          </div>
        </footer>
      </main>
      {isUnlocked && <PulseTicker alerts={tickerAlerts} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(GRDEApp));
    </script>
</body>
</html>
